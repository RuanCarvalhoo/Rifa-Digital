# =============================================================================
#  Nginx — serve o SPA React e faz proxy reverso de /api para a API Express.
# =============================================================================
server {
  listen 80;
  server_name _;

  # Raiz dos estáticos gerados pelo Vite.
  root /usr/share/nginx/html;
  index index.html;

  # Compressão básica para os assets de texto.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # -------------------------------------------------------------------------
  #  API: encaminha tudo que começa com /api para o serviço "api" (rede do
  #  Compose). Assim o browser fala só com o Nginx, evitando CORS.
  # -------------------------------------------------------------------------
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # -------------------------------------------------------------------------
  #  SPA fallback: qualquer rota desconhecida devolve o index.html para o
  #  React Router resolver no cliente.
  # -------------------------------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }
}
